name: Deploy para a Hostinger

# Roda a cada push na branch main (ou manualmente pelo botão "Run workflow")
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixa o código do repositório
      - name: Baixar código
        uses: actions/checkout@v4

      # 2. Instala o Node 22 (mesma versão do .nvmrc)
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # 3. Instala dependências e gera a pasta dist/
      - name: Instalar e buildar
        run: |
          npm ci
          npm run build

      # 4. Envia o conteúdo de dist/ por FTP para o public_html
      - name: Enviar para a Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          # PROTEÇÃO: pastas que o deploy NÃO pode tocar nem apagar.
          # São os subdomínios que vivem dentro do public_html.
          # (a primeira linha mantém as exclusões padrão da ação)
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            byamarcondes/**
            navalhadeouro/**
            studiovitoria/**
            techfox/**
            agenda/**
